openapi: 3.1.0
info:
  title: Platrium Core API
  version: 0.0.0
tags:
  - name: Files
paths:
  /files/create:
    post:
      operationId: Files_createFile
      summary: Create a new file
      description: Creates a New File for the Current User
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFileResponse'
        '400':
          description: The server could not understand the request due to invalid syntax.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidJsonError'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError'
      tags:
        - Files
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
components:
  schemas:
    CreateFileRequest:
      type: object
      required:
        - parent_id
        - file_name
        - hashes
      properties:
        parent_id:
          type: string
          description: ID of the parent folder or drive
        file_name:
          type: string
          description: Name of the file
        hashes:
          type: array
          items:
            type: string
          description: Array of chunk hashes
    CreateFileResponse:
      type: object
      required:
        - file_id
      properties:
        file_id:
          type: string
    InternalServerError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    InvalidJsonError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
servers:
  - url: http://localhost:3000/api
    description: Local development server
    variables: {}
